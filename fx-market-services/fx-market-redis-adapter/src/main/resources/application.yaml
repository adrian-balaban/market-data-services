spring:
  application:
    name: fxMarketRedisAdapter

server:
  port: 4083

vendor:
  redis:
    nodes:
      - host: localhost #It won't work with port forwarding to K8s; only localhost redis may work
        port: 6379
    username: default
    password: default
    poolMaxTotal: 1024
    poolMaxIdle: 64
    poolMinIdle: 4
    connectionTimeout: 2000
    soTimeout: 2000
    maxAttempts: 5
