services:
  fx-market-connector:
    image: docker.io/library/fx-market-connector:latest
    depends_on:
      - broker
    ports:
     - 4080:4080
    networks:
      - docker_net

  fx-market-processor:
    image: docker.io/library/fx-market-processor:latest
    depends_on:
      - broker
    ports:
     - 4081:4081
    networks:
      - docker_net

  flink-orchestrator:
    image: docker.io/library/flink-orchestrator:latest
    depends_on:
      - jobmanager
      - taskmanager
    restart: on-failure
    ports:
     - 4082:4082
    networks:
      - docker_net
