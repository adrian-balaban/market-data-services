services:
  fx-market-connector:
    image: localhost:5001/fx-market-services/fx-market-connector:0.1.0
    depends_on:
      - broker
    ports:
     - 4080:4080
    networks:
      - docker_net
    environment:
      KAFKA_BOOTSTRAP_SERVERS: PLAINTEXT://broker:29092
      VENDOR_MARKET_DATA_STUB_URL: http://fx-market-stub:3080

  fx-market-processor:
    image: localhost:5001/fx-market-services/fx-market-processor:0.1.0
    depends_on:
      - broker
    ports:
     - 4081:4081
    networks:
      - docker_net

