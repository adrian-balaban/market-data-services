    podAnnotations: {}

    service:
      type: ClusterIP
      port: 3080

    extraEnv: []

    resources:
      limits:
        cpu: 1
        memory: 1024Mi
      requests:
        cpu: 500m
        memory: 512Mi

    volumes: []

    autoscaling:
      enabled: false
      minReplicas: 1
