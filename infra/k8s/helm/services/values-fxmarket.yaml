##### APPLICATIONS

apps:
  ###################################
  ##### FX MARKET CONNECTOR APP #####
  ###################################
  fxmarketconnector:
    name: fx-market-connector
    image:
      repository: localhost:5001/fx-market-services/fx-market-connector
#      tag: 0.0.0

    podAnnotations: {}

    service:
      type: ClusterIP
      port: 8080

    extraEnv:
      - name: SERVER_PORT
        value: "8080"
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "PLAINTEXT://kafka:9071"
      - name: VENDOR_MARKET_DATA_STUB_URL
        value: "http://fx-market-data-stub-svc:3080"
      - name: KAFKA_TOPIC
        value: "fx_rates"
      - name: KAFKA_APPLICATION_ID_CONFIG
        value: "fx-market-processor-stream-operator"

    resources:
      limits:
        cpu: 1
        memory: 3072Mi
      requests:
        cpu: 500m
        memory: 3072Mi

    volumes: []

    statefulSet:
      enabled: false

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 1
      targetCPUUtilizationPercentage: 80

    initContainers: {}
    imagePullSecrets: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

  ###################################
  ##### FX MARKET CAMEL CONNECTOR APP #####
  ###################################
  fxmarketcamelconnector:
    name: fx-market-camel-connector
    image:
      repository: localhost:5001/fx-market-services/fx-market-connector
      #tag: 0.0.1
    podAnnotations: {}

    service:
      type: NodePort
      port: 8080

    extraEnv:
      - name: SERVER_PORT
        value: "8080"
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "PLAINTEXT://kafka:9071"
      - name: VENDOR_MARKET_DATA_STUB_URL
        value: "http://fx-market-data-stub-svc:3080"
      - name: KAFKA_TOPIC
        value: "fx_rates_camel"
      - name: JAVA_OPTS
        value: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5005"

    resources:
      limits:
        cpu: 1
        memory: 3072Mi
      requests:
        cpu: 500m
        memory: 3072Mi

    volumes: []

    statefulSet:
      enabled: false

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 1
      targetCPUUtilizationPercentage: 80

    initContainers: {}
    imagePullSecrets: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}


  ###################################
  ##### FX MARKET PROCESSOR APP #####
  ###################################
  fxmarketprocessor:
    name: fx-market-processor
    image:
      repository: localhost:5001/fx-market-services/fx-market-processor
#      tag: 0.0.0

    podAnnotations: {}

    service:
      type: ClusterIP
      port: 8080

    extraEnv:
      - name: SERVER_PORT
        value: "8080"
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "PLAINTEXT://kafka:9071"
      - name: KAFKA_TOPIC
        value: "fx_rates"
      - name: KAFKA_APPLICATION_ID_CONFIG
        value: "fx-market-processor-stream-operator"
      - name: SELF_HOST
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: KAFKA_APPLICATION_SELF_HOST
        value: "$(SELF_HOST).fx-market-processor-svc"
      - name: KAFKA_APPLICATION_SELF_PORT
        value: "8080"
      - name: KAFKA_APPLICATION_STATE_DIR_CONFIG
        value: "/tmp/kafka-streams/fxrates"
    resources:
      limits:
        cpu: 1
        memory: 3072Mi
      requests:
        cpu: 500m
        memory: 3072Mi

    volumes: []

    statefulSet:
      enabled: true
      replicas: 9

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 1
      targetCPUUtilizationPercentage: 80

    initContainers: {}
    imagePullSecrets: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}


  ###################################
  ##### FX MARKET CAMEL PROCESSOR APP #####
  ###################################
  fxmarketcamelprocessor:
    name: fx-market-camel-processor
    image:
      repository: localhost:5001/fx-market-services/fx-market-processor
    #      tag: 0.0.1

    podAnnotations: {}

    service:
      type: ClusterIP
      port: 8080

    extraEnv:
      - name: SERVER_PORT
        value: "8080"
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "PLAINTEXT://kafka:9071"
      - name: KAFKA_TOPIC
        value: "fx_rates_camel"
      - name: KAFKA_APPLICATION_ID_CONFIG
        value: "fx-market-processor-stream-operator-camel"

    resources:
      limits:
        cpu: 1
        memory: 3072Mi
      requests:
        cpu: 500m
        memory: 3072Mi

    volumes: []

    statefulSet:
      enabled: false

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 1
      targetCPUUtilizationPercentage: 80

    initContainers: {}
    imagePullSecrets: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

  ###################################
  ##### FLINK ORCHESTRATOR APP ######
  ###################################
  flinkorchestrator:
    name: flink-orchestrator
    image:
      repository: localhost:5001/fx-market-services/flink-orchestrator
#      tag: 0.0.0

    podAnnotations: {}

    service:
      type: ClusterIP
      port: 8080

    extraEnv:
      - name: SERVER_PORT
        value: "8080"
      - name: FLINK_URL
        value: "http://fx-flink-jobmanager:8081"

    resources:
      limits:
        cpu: 1
        memory: 3584Mi
      requests:
        cpu: 500m
        memory: 3584Mi

    volumes: []

    statefulSet:
      enabled: false

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 1
      targetCPUUtilizationPercentage: 80

    initContainers: {}
    imagePullSecrets: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
