{{- $outer := . -}}
{{ range .Values.apps }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}-svc
  labels:
    managed-by: Helm
    release: {{ $.Release.Name }}
spec:
{{- if not .statefulSet.enabled }}
  type: {{ .service.type }}
{{- end }}
{{- if .statefulSet.enabled }}
  clusterIP: None
{{- end }}
  ports:
    - port: {{ .service.port }}
      targetPort: {{ .service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ .name }}
{{ end }}