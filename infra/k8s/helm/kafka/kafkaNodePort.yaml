apiVersion: v1
kind: Service
metadata:
  name: kafka-nodeport-service
  namespace: ___CHANGE_ME_NAMESPACE___
spec:
  type: NodePort
  selector:
    app: kafka-app
  ports:
    - port: 9092
      targetPort: 9092
      nodePort: ___CHANGE_ME_KAFKA_NODEPORT___ # Choose a port within the NodePort range (30000-32767)
