apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraftcontroller
  namespace: ___CHANGE_ME_NAMESPACE___
spec:
  dataVolumeCapacity: 10G
  image:
    application: docker.io/confluentinc/cp-server:7.7.0
    init: docker.io/confluentinc/confluent-init-container:2.9.0
  replicas: 3
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: ___CHANGE_ME_NAMESPACE___
spec:
  dependencies:
    kRaftController:
      clusterRef:
        name: kraftcontroller
  dataVolumeCapacity: 10G
  image:
    application: docker.io/confluentinc/cp-server:7.7.0
    init: docker.io/confluentinc/confluent-init-container:2.9.0
  replicas: 3
---
apiVersion: platform.confluent.io/v1beta1
kind: Connect
metadata:
  name: connect
  namespace: ___CHANGE_ME_NAMESPACE___
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-server-connect:7.7.0
    init: docker.io/confluentinc/confluent-init-container:2.9.0
  dependencies:
    kafka:
      bootstrapEndpoint: kafka:9071
---
apiVersion: platform.confluent.io/v1beta1
kind: KsqlDB
metadata:
  name: ksqldb
  namespace: ___CHANGE_ME_NAMESPACE___
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-ksqldb-server:7.7.0
    init: docker.io/confluentinc/confluent-init-container:2.9.0
  dataVolumeCapacity: 10Gi
---
apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter
  namespace: ___CHANGE_ME_NAMESPACE___
spec:
  replicas: 1
  podTemplate:
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi
  image:
    application: docker.io/confluentinc/cp-enterprise-control-center:7.7.0
    init: docker.io/confluentinc/confluent-init-container:2.9.0
  dataVolumeCapacity: 10Gi
  dependencies:
    schemaRegistry:
      url: http://schemaregistry:8081
    ksqldb:
      - name: ksqldb
        url: http://ksqldb:8088
    connect:
      - name: connect
        url: http://connect:8083
---
apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: ___CHANGE_ME_NAMESPACE___
spec:
  replicas: 3
  image:
    application: docker.io/confluentinc/cp-schema-registry:7.7.0
    init: docker.io/confluentinc/confluent-init-container:2.9.0
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestProxy
metadata:
  name: kafkarestproxy
  namespace: ___CHANGE_ME_NAMESPACE___
spec:
  replicas: 1
  image:
    application: docker.io/confluentinc/cp-kafka-rest:7.7.0
    init: docker.io/confluentinc/confluent-init-container:2.9.0
  dependencies:
    schemaRegistry:
      url: http://schemaregistry:8081
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestClass
metadata:
  name: krc-cfk
  namespace: ___CHANGE_ME_NAMESPACE___
spec:
  kafkaClusterRef:
    name: kafka
  kafkaRest:
    endpoint: http://kafka:8090