apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  namespace: mj1
  name: fx-flink-processor
spec:
  image: flink:1.17
  flinkVersion: v1_17
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"
  serviceAccount: flink
  podTemplate:
    spec:
      initContainers:
          # Sample sidecar container
        - name: fx-flink-processor
          image: 192.168.192.96:5001/fx-market-flink-jobs/processor:0.0.2
          command: ["sh", "-c", "cp /flink/jars/* /shared/"]
          volumeMounts:
            - mountPath: /shared
              name: flink-jars
      containers:
        # Do not change the main container name
        - name: flink-main-container
          volumeMounts:
            - mountPath: /shared
              name: flink-jars
      volumes:
        - name: flink-jars
          emptyDir: { }
  jobManager:
    resource:
      memory: "2048m"
      cpu: 1
  taskManager:
    resource:
      memory: "2048m"
      cpu: 1
  job:
    jarURI: local:///shared/fxmarketflinkproces-all.jar
    parallelism: 2
    upgradeMode: stateless
    state: running