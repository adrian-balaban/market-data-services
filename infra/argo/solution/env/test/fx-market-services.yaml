    version: 0.4.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fx-market-connector
      release: fx-market-services
  template:
    metadata:
      labels:
        app: fx-market-connector
        release: fx-market-services
        version: 0.4.0
    spec:
      containers:
        - name: fx-market-connector
          image: "192.168.192.96:5001/fx-market-services/fx-market-connector:0.4.0"
          imagePullPolicy: IfNotPresent
          env:
          - name: SERVER_PORT
            value: "8080"
          - name: KAFKA_BOOTSTRAP_SERVERS
            value: PLAINTEXT://kafka:9071
          - name: VENDOR_MARKET_DATA_STUB_URL
            value: http://fx-market-data-stub-svc:3080
          - name: KAFKA_TOPIC
            value: fx_rates
          - name: KAFKA_APPLICATION_ID_CONFIG
            value: fx-market-processor-stream-operator
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            failureThreshold: 3
            initialDelaySeconds: 120
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 1
              memory: 3072Mi
            requests:
              cpu: 500m
              memory: 3072Mi
          volumeMounts:
      topologySpreadConstraints:
      - maxSkew: 3
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            release: fx-market-services
      volumes:
