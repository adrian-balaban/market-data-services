# Source: application/templates/statefulSet.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fx-market-processor-set
  labels:
    managed-by: Helm
    release: fx-market-services
spec:
  serviceName: fx-market-processor-svc
  replicas: 9
  selector:
    matchLabels:
      app: fx-market-processor
      release: fx-market-services
  template:
    metadata:
      labels:
        app: fx-market-processor
        release: fx-market-services
        version: 0.4.0
    spec:
      containers:
        - name: fx-market-processor
          image: "192.168.192.96:5001/fx-market-services/fx-market-processor:0.4.0"
          imagePullPolicy: IfNotPresent
          env:
          - name: SERVER_PORT
            value: "8080"
          - name: KAFKA_BOOTSTRAP_SERVERS
            value: PLAINTEXT://kafka:9071
          - name: KAFKA_TOPIC
            value: fx_rates
          - name: KAFKA_APPLICATION_ID_CONFIG
            value: fx-market-processor-stream-operator
          - name: SELF_HOST
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: KAFKA_APPLICATION_SELF_HOST
            value: $(SELF_HOST).fx-market-processor-svc
          - name: KAFKA_APPLICATION_SELF_PORT
            value: "8080"
          - name: KAFKA_APPLICATION_STATE_DIR_CONFIG
            value: /tmp/kafka-streams/fxrates
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
  volumeClaimTemplates:
  - metadata:
      name: fx-market-processor-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi

