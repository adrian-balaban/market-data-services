# Source: application/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-orchestrator
  labels:
    app: flink-orchestrator
    managed-by: Helm
    release: fx-market-services
    version: 0.3.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-orchestrator
      release: fx-market-services
  template:
    metadata:
      labels:
        app: flink-orchestrator
        release: fx-market-services
        version: 0.3.0
    spec:
      containers:
        - name: flink-orchestrator
          image: "192.168.192.96:5001/fx-market-services/flink-orchestrator:0.3.0"
          imagePullPolicy: IfNotPresent
          env:
          - name: SERVER_PORT
            value: "8080"
          - name: FLINK_URL
            value: http://fx-flink-jobmanager:8081
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            failureThreshold: 3
            initialDelaySeconds: 120
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 1
              memory: 3584Mi
            requests:
              cpu: 500m
              memory: 3584Mi
          volumeMounts:
      topologySpreadConstraints:
      - maxSkew: 3
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            release: fx-market-services
      volumes:
---
