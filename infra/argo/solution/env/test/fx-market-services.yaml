apiVersion: apps/v1
kind: Deployment
metadata:
  name: fx-market-camel-connector
  labels:
    app: fx-market-camel-connector
    managed-by: Helm
    release: fx-market-services
    version: 0.3.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fx-market-camel-connector
      release: fx-market-services
  template:
    metadata:
      labels:
        app: fx-market-camel-connector
        release: fx-market-services
        version: 0.3.0
    spec:
      containers:
        - name: fx-market-camel-connector
          image: "192.168.192.96:5001/fx-market-services/fx-market-camel-connector:0.3.0"
          imagePullPolicy: IfNotPresent
          env:
          - name: SERVER_PORT
            value: "8080"
          - name: KAFKA_BOOTSTRAP_SERVERS
            value: PLAINTEXT://kafka:9092
          - name: VENDOR_MARKET_DATA_STUB_URL
            value: http://fx-market-data-stub-svc:3080
          - name: KAFKA_TOPIC
            value: fx_rates_camel
          - name: JAVA_OPTS
            value: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5005
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            failureThreshold: 3
            initialDelaySeconds: 120
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 1
              memory: 3072Mi
            requests:
              cpu: 500m
              memory: 3072Mi
          volumeMounts:
      topologySpreadConstraints:
      - maxSkew: 3
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            release: fx-market-services
      volumes:
