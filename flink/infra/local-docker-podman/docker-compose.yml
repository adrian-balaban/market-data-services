### Apache Flink docker-compose for Application Mode.
### In application mode you start a Flink cluster that is dedicated to run only the Flink Jobs which have been bundled with the images.
### Hence, you need to build a dedicated Flink Image per application. Please check here for the details.
### See also how to specify the JobManager arguments in the command for the jobmanager service.
### Used last release of Flink 1.20.0 build with java 17 and scala 2.12

### See https://nightlies.apache.org/flink/flink-docs-master/docs/deployment/resource-providers/standalone/docker/#application-mode-1.
version: "2.2"
services:
  jobmanager:
    image: flink:1.20.0-scala_2.12-java17
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager        

  taskmanager:
    image: flink:1.20.0-scala_2.12-java17
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2