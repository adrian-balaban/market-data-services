/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'version-catalog'
}
catalog {
    versionCatalog {
        from(files("gradle/libs.versions.toml"))
    }
}
repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    implementation libs.com.google.code.gson
    api libs.org.apache.flink.flink.queryable.state.runtime.v2.v12
    api libs.org.apache.flink.flink.queryable.state.client.java.v2.v12
    runtimeOnly libs.org.slf4j.slf4j.log4j12
    runtimeOnly libs.log4j.log4j
    compileOnly libs.org.apache.flink.flink.java
    compileOnly libs.org.apache.flink.flink.streaming.java.v2.v12
    compileOnly libs.org.apache.flink.flink.runtime.web.v2.v12
    compileOnly libs.org.apache.derby.derby
}

group = 'io.github.streamingwithflink'
version = '1.0'
description = 'Java Examples for Stream Processing with Apache Flink'
//java.sourceCompatibility = JavaVersion.VERSION_1_8

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
