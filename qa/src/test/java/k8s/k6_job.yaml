apiVersion: batch/v1
kind: Job
metadata:
  name: k6-performance-test
  namespace: test
spec:
  template:
    spec:
      containers:
        - name: k6
          image: grafana/k6
          env:
            - name: STUB_HOST
              value: "http://fx-market-data-stub-svc:3080"
            - name: PROCESSOR_HOST
              value: "http://fx-market-processor-svc:8080"
            - name: SCRIPT_NAME
              valueFrom:
                configMapKeyRef:
                  name: k6-performance
                  key: scriptName
            - name: TEST_MODE
              valueFrom:
                configMapKeyRef:
                  name: k6-performance
                  key: testMode
          command: ["/bin/sh", "-c", "TEST_MODE=$TEST_MODE k6 run /performance/$SCRIPT_NAME"]
          volumeMounts:
            - name: performance
              mountPath: /performance
      volumes:
        - name: performance
          configMap:
            name: k6-performance
      restartPolicy: Never